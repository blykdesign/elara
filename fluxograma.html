// ─── Layout multipliers ───
const MX = 14;   // x multiplier (node.x * MX = SVG x)
const MY = 9.5;  // y multiplier (node.y * MY = SVG y)

// ─── Helper: compute node dimensions from label ───
const getNodeSize = (label, scale = 1) => {
  const lines = label.split("\n");
  const lineCount = lines.length;
  const longestLine = Math.max(...lines.map(l => l.length));
  const charW = 5.0;
  const lineH = 12;
  const padX = 24;
  const padY = 18;
  const w = Math.max(124, longestLine * charW + padX) * scale;
  const h = Math.max(56, lineCount * lineH + padY) * scale;
  return { w, h };
};

// ─── Helper Components ───
const NodeBox = ({ node, isSelected, onClick, scale = 1 }) => {
  const colorMap = {
    user: { bg: "#25D366", text: "#FFF", border: "#128C7E" },
    elara: { bg: "#DCF8C6", text: "#111", border: "#25D366" },
    decision: { bg: "#FEF3C7", text: "#92400E", border: "#F59E0B" },
    system: { bg: "#EEF2FF", text: "#3730A3", border: "#6366F1" },
    danger: { bg: "#FEE2E2", text: "#991B1B", border: "#EF4444" },
    success: { bg: "#D1FAE5", text: "#065F46", border: "#10B981" },
    info: { bg: "#DBEAFE", text: "#1E40AF", border: "#3B82F6" },
    tracking: { bg: "#EDE9FE", text: "#5B21B6", border: "#8B5CF6" },
  };
  const c = colorMap[node.type] || colorMap.system;
  const isDecision = node.type === "decision";
  const { w, h } = getNodeSize(node.label, scale);
  const lines = node.label.split("\n");

  return (
    <g
      onClick={() => onClick?.(node)}
      style={{ cursor: "pointer" }}
      transform={`translate(${node.x * MX}, ${node.y * MY})`}
    >
      {isSelected && (
        <rect
          x={-w / 2 - 3}
          y={-h / 2 - 3}
          width={w + 6}
          height={h + 6}
          rx={isDecision ? 5 : 10}
          fill="none"
          stroke="#075E54"
          strokeWidth={2}
          strokeDasharray="4 2"
          opacity={0.6}
        />
      )}
      <rect
        x={-w / 2}
        y={-h / 2}
        width={w}
        height={h}
        rx={isDecision ? 3 : 8}
        fill={c.bg}
        stroke={isSelected ? "#075E54" : c.border}
        strokeWidth={isSelected ? 2.5 : 1.5}
      />
      {lines.map((line, i, arr) => (
        <text
          key={i}
          x={0}
          y={(-6 * (arr.length - 1) + i * 12) * scale}
          textAnchor="middle"
          dominantBaseline="central"
          fill={c.text}
          fontSize={8.5 * scale}
          fontFamily="system-ui, sans-serif"
          fontWeight={i === 0 ? 600 : 400}
        >
          {line}
        </text>
      ))}
    </g>
  );
};

const Edge = ({ from, to, label, nodes }) => {
  const n1 = nodes.find((n) => n.id === from);
  const n2 = nodes.find((n) => n.id === to);
  if (!n1 || !n2) return null;

  const h1 = getNodeSize(n1.label).h;
  const h2 = getNodeSize(n2.label).h;
  const x1 = n1.x * MX;
  const y1 = n1.y * MY + h1 / 2;
  const x2 = n2.x * MX;
  const y2 = n2.y * MY - h2 / 2;
  const mx = (x1 + x2) / 2;
  const my = (y1 + y2) / 2;

  return (
    <g>
      <path
        d={`M ${x1} ${y1} C ${x1} ${my}, ${x2} ${my}, ${x2} ${y2}`}
        fill="none"
        stroke="#9CA3AF"
        strokeWidth={1.2}
        markerEnd="url(#arrow)"
      />
      {label && (() => {
        const edgeLines = label.split("\n");
        const longestEdgeLine = Math.max(...edgeLines.map(l => l.length));
        const ew = longestEdgeLine * 4.5 + 12;
        const eh = edgeLines.length * 10 + 6;
        return (
          <g>
            <rect
              x={mx - ew / 2}
              y={my - eh / 2 - 2}
              width={ew}
              height={eh}
              rx={4}
              fill="#FFF"
              stroke="#D1D5DB"
              strokeWidth={0.8}
              opacity={0.95}
            />
            <text
              x={mx}
              y={my - (edgeLines.length - 1) * 5}
              textAnchor="middle"
              dominantBaseline="central"
              fill="#6B7280"
              fontSize={7}
              fontFamily="system-ui"
              fontWeight={600}
            >
              {edgeLines.map((l, i) => (
                <tspan key={i} x={mx} dy={i === 0 ? 0 : 10}>
                  {l}
                </tspan>
              ))}
            </text>
          </g>
        );
      })()}
    </g>
  );
};

// ─── Main Component ───
function ElaraFlowchart() {
  const [selectedFlow, setSelectedFlow] = useState("entry");
  const [showChat, setShowChat] = useState(true);
  const [zoom, setZoom] = useState(1);
  const [selectedNodeId, setSelectedNodeId] = useState(null);

  const flow = useMemo(
    () => FLOWS.find((f) => f.id === selectedFlow),
    [selectedFlow]
  );

  // Split conversation into discrete scenarios by divider lines
  const scenarios = useMemo(() => {
    if (!flow) return [];
    const result = [];
    let current = [];
    for (const msg of flow.conversation) {
      if (msg.from === "system" && /^[\u2500]+$/.test(msg.text)) {
        if (current.length > 0) result.push(current);
        current = [];
      } else {
        current.push(msg);
      }
    }
    if (current.length > 0) result.push(current);
    return result;
  }, [flow]);

  const visibleConversation = useMemo(() => {
    if (!flow) return [];
    if (!selectedNodeId) return flow.conversation;
    const map = NODE_CHAT_MAP[flow.id];
    if (!map || !(selectedNodeId in map)) return flow.conversation;
    const scenarioIdx = map[selectedNodeId];
    if (scenarioIdx >= 0 && scenarioIdx < scenarios.length) {
      return scenarios[scenarioIdx];
    }
    return flow.conversation;
  }, [flow, selectedNodeId, scenarios]);

  const handleFlowSelect = useCallback((id) => {
    setSelectedFlow(id);
    setSelectedNodeId(null);
    setZoom(1);
  }, []);

  return (
    <div
      style={{
        display: "flex",
        height: "100vh",
        width: "100vw",
        overflow: "hidden",
        fontFamily: "system-ui, -apple-system, sans-serif",
        background: "#F9FAFB",
        color: COLORS.textPrimary,
      }}
    >
      {/* ─── Sidebar ─── */}
      <div
        style={{
          width: "240px",
          minWidth: "240px",
          background: "#075E54",
          color: "#FFF",
          overflowY: "auto",
          display: "flex",
          flexDirection: "column",
        }}
      >
        <div
          style={{
            padding: "16px",
            borderBottom: "1px solid rgba(255,255,255,0.15)",
          }}
        >
          <div style={{ fontSize: "18px", fontWeight: 700 }}>
            Fluxograma Elara
          </div>
          <div style={{ fontSize: "11px", opacity: 0.7, marginTop: "4px" }}>
            Outlet Premium SP
          </div>
          <div
            style={{
              fontSize: "10px",
              opacity: 0.5,
              marginTop: "2px",
            }}
          >
            {FLOWS.length} fluxos mapeados
          </div>
        </div>

        <div style={{ flex: 1, padding: "8px" }}>
          {FLOWS.map((f) => (
            <button
              key={f.id}
              onClick={() => handleFlowSelect(f.id)}
              style={{
                display: "flex",
                alignItems: "center",
                gap: "8px",
                width: "100%",
                padding: "10px 12px",
                marginBottom: "2px",
                border: "none",
                borderRadius: "8px",
                background:
                  selectedFlow === f.id
                    ? "rgba(255,255,255,0.2)"
                    : "transparent",
                color: "#FFF",
                fontSize: "12px",
                fontWeight: selectedFlow === f.id ? 700 : 400,
                cursor: "pointer",
                textAlign: "left",
                transition: "background 0.15s",
              }}
            >
              <span style={{ fontSize: "16px" }}>{f.icon}</span>
              <div>
                <div>{f.title}</div>
                <div style={{ fontSize: "9px", opacity: 0.6 }}>
                  {f.section}
                </div>
              </div>
            </button>
          ))}
        </div>

        <div
          style={{
            padding: "12px",
            borderTop: "1px solid rgba(255,255,255,0.15)",
          }}
        >
          <div style={{ fontSize: "9px", opacity: 0.5 }}>
            Legenda dos nós:
          </div>
          {[
            { color: "#25D366", label: "Usuário" },
            { color: "#DCF8C6", label: "Elara (resposta)", textColor: "#111" },
            { color: "#FEF3C7", label: "Decisão", textColor: "#92400E" },
            { color: "#EEF2FF", label: "Sistema", textColor: "#3730A3" },
            { color: "#FEE2E2", label: "Alerta/Proibido", textColor: "#991B1B" },
            { color: "#D1FAE5", label: "Sucesso", textColor: "#065F46" },
          ].map((item) => (
            <div
              key={item.label}
              style={{
                display: "flex",
                alignItems: "center",
                gap: "6px",
                marginTop: "4px",
              }}
            >
              <div
                style={{
                  width: "12px",
                  height: "12px",
                  borderRadius: "3px",
                  background: item.color,
                  border: "1px solid rgba(0,0,0,0.15)",
                }}
              />
              <span style={{ fontSize: "9px", opacity: 0.7 }}>
                {item.label}
              </span>
            </div>
          ))}
        </div>
      </div>

      {/* ─── Main Content ─── */}
      <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0, overflow: "hidden" }}>
        {/* Header */}
        <div
          style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            padding: "12px 20px",
            background: "#FFF",
            borderBottom: `1px solid ${COLORS.border}`,
            flexShrink: 0,
          }}
        >
          <div>
            <div style={{ display: "flex", alignItems: "center", gap: "8px" }}>
              <span style={{ fontSize: "24px" }}>{flow?.icon}</span>
              <div>
                <h2 style={{ fontSize: "16px", fontWeight: 700, margin: 0 }}>
                  {flow?.title}
                </h2>
                <span
                  style={{
                    fontSize: "11px",
                    color: COLORS.textSecondary,
                  }}
                >
                  {flow?.section} - {flow?.description}
                </span>
              </div>
            </div>
          </div>
          <div style={{ display: "flex", gap: "8px", alignItems: "center" }}>
            <div style={{ display: "flex", gap: "4px" }}>
              <button
                onClick={() => setZoom((z) => Math.max(0.5, z - 0.15))}
                style={{
                  padding: "4px 10px",
                  border: `1px solid ${COLORS.border}`,
                  borderRadius: "6px",
                  background: "#FFF",
                  cursor: "pointer",
                  fontSize: "14px",
                }}
              >
                -
              </button>
              <span
                style={{
                  padding: "4px 8px",
                  fontSize: "11px",
                  color: COLORS.textSecondary,
                }}
              >
                {Math.round(zoom * 100)}%
              </span>
              <button
                onClick={() => setZoom((z) => Math.min(2, z + 0.15))}
                style={{
                  padding: "4px 10px",
                  border: `1px solid ${COLORS.border}`,
                  borderRadius: "6px",
                  background: "#FFF",
                  cursor: "pointer",
                  fontSize: "14px",
                }}
              >
                +
              </button>
            </div>
            <button
              onClick={() => setShowChat(!showChat)}
              style={{
                padding: "6px 14px",
                border: `1px solid ${COLORS.border}`,
                borderRadius: "8px",
                background: showChat ? "#075E54" : "#FFF",
                color: showChat ? "#FFF" : COLORS.textPrimary,
                cursor: "pointer",
                fontSize: "11px",
                fontWeight: 600,
              }}
            >
              {showChat ? "Ocultar Chat" : "Ver Chat"}
            </button>
          </div>
        </div>

        {/* Content Area */}
        <div style={{ flex: 1, display: "flex", overflow: "hidden", minHeight: 0 }}>
          {/* Flowchart */}
          <div
            style={{
              flex: 1,
              overflow: "auto",
              background: "#F3F4F6",
              position: "relative",
              minWidth: 0,
            }}
          >
            <svg
              width={1600 * zoom}
              height={1300 * zoom}
              viewBox="-100 -60 1600 1300"
              style={{ display: "block" }}
            >
              <defs>
                <marker
                  id="arrow"
                  viewBox="0 0 10 10"
                  refX="9"
                  refY="5"
                  markerWidth="6"
                  markerHeight="6"
                  orient="auto-start-reverse"
                >
                  <path d="M 0 0 L 10 5 L 0 10 z" fill="#9CA3AF" />
                </marker>
              </defs>

              {/* Edges */}
              {flow?.edges.map((edge, i) => (
                <Edge
                  key={i}
                  from={edge.from}
                  to={edge.to}
                  label={edge.label}
                  nodes={flow.nodes}
                />
              ))}

              {/* Nodes */}
              {flow?.nodes.map((node) => (
                <NodeBox key={node.id} node={node} scale={1} isSelected={selectedNodeId === node.id} onClick={(n) => setSelectedNodeId(selectedNodeId === n.id ? null : n.id)} />
              ))}
            </svg>
          </div>

          {/* Chat Simulation */}
          {showChat && (
            <div
              style={{
                width: "320px",
                minWidth: "320px",
                maxWidth: "320px",
                flexShrink: 0,
                borderLeft: `1px solid ${COLORS.border}`,
                display: "flex",
                flexDirection: "column",
                background: "#FFF",
              }}
            >
              <div
                style={{
                  padding: "12px 16px",
                  background: "#075E54",
                  color: "#FFF",
                  display: "flex",
                  alignItems: "center",
                  gap: "10px",
                }}
              >
                <div
                  style={{
                    width: "32px",
                    height: "32px",
                    borderRadius: "50%",
                    background: "#25D366",
                    display: "flex",
                    alignItems: "center",
                    justifyContent: "center",
                    fontSize: "16px",
                  }}
                >
                  E
                </div>
                <div>
                  <div style={{ fontSize: "13px", fontWeight: 600 }}>
                    Elara
                  </div>
                  <div style={{ fontSize: "10px", opacity: 0.7 }}>
                    Simulação de conversa
                  </div>
                </div>
              </div>

              <div
                style={{
                  flex: 1,
                  overflowY: "auto",
                  background: COLORS.bg,
                  padding: "8px 0",
                }}
              >
                <div
                  style={{
                    textAlign: "center",
                    padding: "4px 12px",
                    margin: "4px 40px 8px",
                    fontSize: "10px",
                    color: "#6B7280",
                    background: "rgba(255,255,255,0.8)",
                    borderRadius: "8px",
                  }}
                >
                  {flow?.icon} {flow?.title}
                </div>
                {selectedNodeId && (
                  <div
                    style={{
                      textAlign: "center",
                      padding: "6px 12px",
                      margin: "4px 16px 4px",
                      fontSize: "10px",
                      color: "#FFF",
                      background: "#075E54",
                      borderRadius: "8px",
                      cursor: "pointer",
                      fontWeight: 600,
                    }}
                    onClick={() => setSelectedNodeId(null)}
                  >
                    Cenario: {flow?.nodes.find(n => n.id === selectedNodeId)?.label.split("\n")[0]} - Clique para ver todos
                  </div>
                )}
                {visibleConversation.map((msg, i) => (
                  <ChatBubble key={i} msg={msg} />
                ))}
              </div>

              <div
                style={{
                  padding: "8px 12px",
                  borderTop: `1px solid ${COLORS.border}`,
                  background: "#F0F0F0",
                  fontSize: "10px",
                  color: "#999",
                  textAlign: "center",
                }}
              >
                {selectedNodeId
                  ? "Clique em outro no para ver seu cenario, ou no banner para ver todos"
                  : "Clique em um no do fluxograma para ver o cenario daquele caminho"}
              </div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ElaraFlowchart />);
</script>
</body>
</html>
